# fly.toml app configuration file generated for mon-wordpress-app-wild-dawn-9963 on 2025-09-26T18:31:01+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mon-wordpress-app-wild-dawn-9963'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  WORDPRESS_DB_HOST = 'mon-wordpress-db.internal'
  WORDPRESS_DB_NAME = 'mon-wordpress-db'
  WORDPRESS_DB_PASSWORD = 'Leviathan@472'
  WORDPRESS_DB_USER = 'mlvoe'

[[mounts]]
  source = 'wp_data'
  destination = '/var/www/html/wp-content'

[[services]]
  protocol = ''
  internal_port = 80
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
