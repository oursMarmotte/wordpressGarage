# fly.toml app configuration file generated for mon-wordpress-db on 2025-09-26T17:43:03+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mon-wordpress-db'
primary_region = 'cdg'

[build]
  image = 'mysql'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
